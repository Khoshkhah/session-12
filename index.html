async function unlock(){
 const pw=document.getElementById("pw").value.trim();if(!pw)return;
 const data=Uint8Array.from(atob(PAYLOAD),c=>c.charCodeAt(0));
 const salt=data.slice(0,16),iv=data.slice(16,28),ct=data.slice(28);
 try{
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:310000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
 }catch(e){
  document.getElementById("err").style.visibility="visible";
  const c=document.querySelector(".card");c.classList.remove("shake");void c.offsetWidth;c.classList.add("shake");
 }
}
document.getElementById("go").onclick=unlock;
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
</script></body></html>
